<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KO Technical Graph</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #607080;
      --line: #d9e1e8;
      --panel: #f6f8fa;
      --positive: #0f7a3b;
      --negative: #b42318;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: white;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 26px 18px 44px;
    }
    a {
      color: #205493;
      text-decoration: none;
      font-weight: 700;
    }
    h1 {
      margin: 14px 0 4px;
      font-size: 28px;
    }
    .meta {
      color: var(--muted);
      margin: 0 0 18px;
    }
    .summary {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin: 0 0 18px;
      padding: 14px;
    }
    .label {
      color: var(--muted);
      display: block;
      font-size: 12px;
      text-transform: uppercase;
    }
    .badge {
      background: white;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: inline-block;
      margin: 4px 5px 0 0;
      padding: 4px 7px;
    }
    .muted, .axis, .legend {
      color: var(--muted);
      fill: var(--muted);
      font-size: 13px;
    }
    .chart {
      border: 1px solid var(--line);
      border-radius: 8px;
      width: 100%;
      height: auto;
    }
    .title {
      fill: var(--ink);
      font-size: 16px;
      font-weight: 700;
    }
    .bull-label {
      fill: var(--positive);
      font-size: 14px;
      font-weight: 700;
    }
    .bear-label {
      fill: var(--negative);
      font-size: 14px;
      font-weight: 700;
    }
    .empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      padding: 24px;
    }
  </style>
</head>
