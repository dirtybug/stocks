    :root {

    body {

      color: var(--ink);
      background: white;
    }
    main {

    }
    .meta {

    }
    .summary {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin: 0 0 18px;
      padding: 14px;
    }
    .label {
      color: var(--muted);
      display: block;
      font-size: 12px;
      text-transform: uppercase;
    }
    .badge {
      background: white;
      border: 1px solid var(--line);
      border-radius: 6px;
      display: inline-block;
      margin: 4px 5px 0 0;
      padding: 4px 7px;
    }
    .muted, .axis, .legend {
      color: var(--muted);
      fill: var(--muted);
      font-size: 13px;
    }
    .chart {
      border: 1px solid var(--line);
      border-radius: 8px;
      width: 100%;
      height: auto;
    }
    .title {
      fill: var(--ink);
      font-size: 16px;
      font-weight: 700;
    }
    .bull-label {
      fill: var(--positive);
      font-size: 14px;
      font-weight: 700;
    }
    .bear-label {
      fill: var(--negative);
      font-size: 14px;
      font-weight: 700;
    }
    .empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      padding: 24px;
    }
  </style>
</head>
