      border-radius: 8px;
      width: 100%;
      height: auto;
    }

    }

      font-size: 14px;
      font-weight: 700;
    }
    .bear-label {
      fill: var(--negative);
      font-size: 14px;
      font-weight: 700;
    }
    .empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      padding: 24px;
    }
  </style>
